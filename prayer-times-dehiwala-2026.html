<title>Prayer Times — Dehiwala 2026</title>

<style>
/* ===== THEME VARIABLES ===== */
[data-theme="dark"] {
  --bg-page:#0a1628; --bg-card:#0f2035; --bg-panel:#162840; --bg-input:#0d1e33;
  --gold:#c8a96e; --gold-light:#e8cc9a; --gold-dim:#7a6040;
  --teal:#4ecdc4; --teal-dim:#2a7a75; --teal-bg:rgba(78,205,196,0.08);
  --text-1:#f0e6d3; --text-2:#a89070; --text-3:#4a5a6a;
  --border:rgba(200,169,110,0.18); --border-strong:rgba(200,169,110,0.38);
  --friday-bg:rgba(78,205,196,0.06); --friday-border:rgba(78,205,196,0.3);
  --notif-bg:#0f2035; --notif-border:rgba(200,169,110,0.25);
  --toggle-bg:#162840; --toggle-knob:#c8a96e;
  --stars:1;
}
[data-theme="light"] {
  --bg-page:#f5f0e8; --bg-card:#ffffff; --bg-panel:#f0ebe0; --bg-input:#f8f4ee;
  --gold:#8a5f20; --gold-light:#6b4a18; --gold-dim:#b8912e;
  --teal:#1a8a84; --teal-dim:#1a8a84; --teal-bg:rgba(26,138,132,0.08);
  --text-1:#2c1f0e; --text-2:#6b5030; --text-3:#9a8060;
  --border:rgba(139,95,32,0.2); --border-strong:rgba(139,95,32,0.4);
  --friday-bg:rgba(26,138,132,0.06); --friday-border:rgba(26,138,132,0.3);
  --notif-bg:#fff8f0; --notif-border:rgba(139,95,32,0.25);
  --toggle-bg:#e8dcc8; --toggle-knob:#8a5f20;
  --stars:0;
}
[data-theme="light"] body::before { opacity: 0; }

/* ===== BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg-page);color:var(--text-1);font-family:'Lato',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;transition:opacity .3s;
  background-image:radial-gradient(1px 1px at 8% 12%,rgba(255,255,255,.35) 0%,transparent 100%),
  radial-gradient(1px 1px at 22% 38%,rgba(255,255,255,.22) 0%,transparent 100%),
  radial-gradient(1px 1px at 43% 8%,rgba(255,255,255,.38) 0%,transparent 100%),
  radial-gradient(1px 1px at 58% 58%,rgba(255,255,255,.2) 0%,transparent 100%),
  radial-gradient(1px 1px at 73% 22%,rgba(255,255,255,.3) 0%,transparent 100%),
  radial-gradient(1px 1px at 88% 42%,rgba(255,255,255,.25) 0%,transparent 100%),
  radial-gradient(1.5px 1.5px at 33% 78%,rgba(255,255,255,.15) 0%,transparent 100%),
  radial-gradient(1px 1px at 63% 88%,rgba(255,255,255,.2) 0%,transparent 100%);}
.container{position:relative;z-index:1;max-width:480px;margin:0 auto;padding-bottom:76px;}

/* ===== HEADER ===== */
.header{text-align:center;padding:1.4rem 1.5rem 1rem;border-bottom:1px solid var(--border);
  background:var(--bg-page);position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);
  display:flex;flex-direction:column;align-items:center;}
.header-top{width:100%;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.header-arabic{font-size:15px;color:var(--gold-dim);flex:1;text-align:center;}
.header-actions{display:flex;gap:8px;align-items:center;}

/* Theme toggle */
.theme-toggle{background:var(--toggle-bg);border:1px solid var(--border);border-radius:20px;
  width:42px;height:22px;cursor:pointer;position:relative;transition:background .3s;flex-shrink:0;}
.theme-toggle-knob{position:absolute;top:2px;width:16px;height:16px;border-radius:50%;
  background:var(--toggle-knob);transition:left .25s;left:2px;}
[data-theme="light"] .theme-toggle-knob{left:22px;}
.theme-toggle-icon{position:absolute;top:50%;transform:translateY(-50%);font-size:10px;line-height:1;}
[data-theme="dark"] .sun-icon{right:3px;opacity:.5;}
[data-theme="dark"] .moon-icon{left:3px;opacity:1;}
[data-theme="light"] .sun-icon{right:3px;opacity:1;}
[data-theme="light"] .moon-icon{left:3px;opacity:.4;}

/* Notif button */
.notif-btn{background:none;border:1px solid var(--border);border-radius:8px;
  padding:3px 8px;cursor:pointer;font-size:11px;color:var(--text-3);
  transition:all .2s;white-space:nowrap;font-family:'Lato',sans-serif;}
.notif-btn.granted{color:var(--teal);border-color:var(--teal-dim);}
.notif-btn.denied{color:#e07b5a;border-color:rgba(224,123,90,.3);}

.header-title{font-family:'Cinzel',serif;font-size:20px;font-weight:600;color:var(--gold);letter-spacing:1px;}
.header-sub{font-size:11px;color:var(--text-3);margin-top:2px;letter-spacing:2px;text-transform:uppercase;}

/* ===== CLOCK ===== */
.clock-wrap{text-align:center;padding:1.1rem 1.5rem 0.4rem;}
.clock-time{font-size:44px;font-weight:700;color:var(--text-1);letter-spacing:3px;line-height:1;font-variant-numeric:tabular-nums;}
.clock-date{font-size:12px;color:var(--text-3);margin-top:4px;letter-spacing:.4px;}

/* ===== COUNTDOWN ===== */
.countdown-card{margin:1rem 1.25rem 0;background:var(--bg-card);border:1px solid var(--border-strong);
  border-radius:14px;padding:1.3rem 1.5rem;text-align:center;position:relative;overflow:hidden;transition:background .3s,border .3s;}
.countdown-card::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(200,169,110,0.06) 0%,transparent 65%);}
[data-theme="light"] .countdown-card::before{background:radial-gradient(ellipse at 50% 0%,rgba(139,95,32,0.05) 0%,transparent 65%);}
.next-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-3);margin-bottom:4px;}
.next-name{font-family:'Cinzel',serif;font-size:25px;font-weight:600;color:var(--gold);margin-bottom:2px;}
.next-time{font-size:36px;font-weight:700;color:var(--teal);letter-spacing:2px;font-variant-numeric:tabular-nums;margin-bottom:5px;}
.next-remaining{font-size:13px;color:var(--text-2);}
.next-remaining span{color:var(--gold-light);}

/* ===== JUMU'AH CARD ===== */
.jumuah-card{margin:0.8rem 1.25rem 0;background:var(--friday-bg);border:1px solid var(--friday-border);
  border-radius:12px;padding:1.1rem 1.25rem;transition:all .3s;}
.jumuah-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.jumuah-title{font-family:'Cinzel',serif;font-size:14px;color:var(--teal);font-weight:600;}
.jumuah-time{font-size:15px;font-weight:700;color:var(--teal);font-variant-numeric:tabular-nums;}
.jumuah-hadith{font-size:12px;color:var(--text-2);line-height:1.6;font-style:italic;border-top:1px solid var(--friday-border);padding-top:8px;margin-top:4px;}
.jumuah-source{font-size:10px;color:var(--text-3);margin-top:4px;font-style:normal;letter-spacing:.5px;}

/* ===== PRAYER LIST ===== */
.prayer-list{margin:0.9rem 1.25rem 0;display:flex;flex-direction:column;gap:6px;}
.prayer-item{display:flex;align-items:center;padding:12px 15px;background:var(--bg-card);
  border:1px solid var(--border);border-radius:10px;position:relative;overflow:hidden;transition:background .3s,border .3s,opacity .2s;}
.prayer-item.is-next{border-color:var(--teal-dim);background:var(--teal-bg);box-shadow:0 0 16px rgba(78,205,196,0.07);}
.prayer-item.is-past{opacity:.35;}
.active-bar{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--teal);border-radius:10px 0 0 10px;}
.p-dot{width:9px;height:9px;border-radius:50%;margin-right:13px;flex-shrink:0;}
.p-name{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--text-1);flex:1;}
.p-arabic{font-size:11px;color:var(--text-3);margin-left:4px;}
.p-time{font-size:17px;font-weight:700;color:var(--text-1);font-variant-numeric:tabular-nums;}
.prayer-item.is-next .p-time{color:var(--teal);}

/* ===== NOTIFICATION BANNER ===== */
.notif-banner{margin:0.8rem 1.25rem 0;background:var(--notif-bg);border:1px solid var(--notif-border);
  border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .2s;}
.notif-banner:hover{border-color:var(--border-strong);}
.notif-banner-icon{font-size:18px;flex-shrink:0;}
.notif-banner-text{flex:1;}
.notif-banner-title{font-size:13px;font-weight:400;color:var(--text-1);margin-bottom:1px;}
.notif-banner-sub{font-size:11px;color:var(--text-3);}
.notif-banner-cta{font-size:11px;color:var(--teal);font-weight:700;white-space:nowrap;letter-spacing:.5px;}

/* ===== BOTTOM NAV ===== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;
  background:var(--bg-page);border-top:1px solid var(--border);
  display:flex;justify-content:space-around;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:200;
  backdrop-filter:blur(14px);transition:background .3s,border .3s;}
.nav-btn{background:none;border:none;color:var(--text-3);cursor:pointer;display:flex;
  flex-direction:column;align-items:center;gap:3px;padding:6px 28px;border-radius:8px;
  transition:color .2s;font-family:'Lato',sans-serif;}
.nav-btn.active{color:var(--gold);}
.nav-btn svg{width:22px;height:22px;}
.nav-btn span{font-size:10px;letter-spacing:1px;text-transform:uppercase;}

/* ===== PAGES ===== */
.page{display:none;} .page.active{display:block;}

/* ===== TIMETABLE ===== */
.month-list{margin:1.1rem 1.25rem;display:flex;flex-direction:column;gap:10px;}
.month-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:background .3s,border .3s;}
.month-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;
  cursor:pointer;user-select:none;background:var(--bg-panel);transition:background .3s;}
.month-head:active{opacity:.8;}
.month-head-name{font-family:'Cinzel',serif;font-size:15px;color:var(--gold);}
.month-head-toggle{color:var(--text-3);font-size:16px;transition:transform .2s;}
.month-card.open .month-head-toggle{transform:rotate(180deg);}
.month-body{display:none;overflow-x:auto;}
.month-card.open .month-body{display:block;}
.mt{width:100%;border-collapse:collapse;font-size:11px;}
.mt th{padding:8px 4px;color:var(--text-3);text-align:center;border-bottom:1px solid var(--border);
  font-weight:400;letter-spacing:1px;text-transform:uppercase;}
.mt td{padding:7px 4px;text-align:center;color:var(--text-2);
  border-bottom:1px solid rgba(200,169,110,0.05);font-variant-numeric:tabular-nums;}
[data-theme="light"] .mt td{border-bottom-color:rgba(139,95,32,0.07);}
.mt tr:last-child td{border-bottom:none;}
.mt td:first-child{color:var(--text-3);font-size:10px;}
.mt tr.today-row td{color:var(--teal);background:var(--teal-bg);}
.mt tr.today-row td:first-child{font-weight:700;}
.mt tr.friday-row td{background:var(--friday-bg);}
.mt tr.friday-row td:first-child{color:var(--teal);font-weight:700;}

@media(max-width:380px){
  .next-time{font-size:30px;} .clock-time{font-size:36px;}
  .mt{font-size:10px;} .mt td,.mt th{padding:6px 3px;}
}
</style>
</head>

// ---- TIME UTILS ----
function toMins(str, idx) {
  const [h, m] = str.split(':').map(Number);
  if (idx < 2) return h * 60 + m;
  if (idx === 2) return 720 + m;
  return (h === 12 ? 12 : h + 12) * 60 + m;
}
function fmt(mins) {
  const h = Math.floor(mins / 60) % 24, m = mins % 60;
  return (h % 12 || 12) + ':' + String(m).padStart(2,'0') + ' ' + (h >= 12 ? 'PM' : 'AM');
}
function getTimes(month, day) {
  const mData = RAW[month]; if (!mData) return null;
  const row = mData.find(r => r[0] === day); if (!row) return null;
  return row.slice(1).map((t, i) => toMins(t, i));
}

// ---- HIJRI ----
function toHijri(gy, gm, gd) {
  let y = gy, m = gm, d = gd;
  if (m < 3) { y--; m += 12; }
  const A = Math.floor(y/100), B = 2 - A + Math.floor(A/4);
  const JD = Math.floor(365.25*(y+4716)) + Math.floor(30.6001*(m+1)) + d + B - 1524.5;
  const hYear = Math.floor((30*(JD-1948439.5)+10646)/10631);
  const hYearStart = 1948439.5 + 29.5001*Math.floor((11*hYear+3)/30);
  const hMonth = Math.min(12, Math.ceil((JD-hYearStart)/29.5)+1);
  const hMonthStart = hYearStart + 29.5001*Math.floor(hMonth-1);
  const hDay = Math.max(1, Math.min(Math.floor(JD-hMonthStart)+1, 30));
  return { y: hYear, m: hMonth, d: hDay };
}

// ---- NOTIFICATIONS ----
let notifGranted = false;
let scheduledToday = '';

function updateNotifBtn() {
  const btn = document.getElementById('notif-btn');
  const perm = Notification.permission;
  if (perm === 'granted') {
    btn.textContent = '🔔 On'; btn.className = 'notif-btn granted';
    notifGranted = true;
  } else if (perm === 'denied') {
    btn.textContent = '🔕 Off'; btn.className = 'notif-btn denied';
  } else {
    btn.textContent = '🔔'; btn.className = 'notif-btn';
  }
}

function showNotifBanner() {
  if (!('Notification' in window) || Notification.permission !== 'default') return;
  const wrap = document.getElementById('notif-banner-wrap');
  wrap.innerHTML = `
    <div class="notif-banner" onclick="requestNotifications()">
      <div class="notif-banner-icon">🔔</div>
      <div class="notif-banner-text">
        <div class="notif-banner-title">Enable prayer time reminders</div>
        <div class="notif-banner-sub">Get notified at each prayer time</div>
      </div>
      <div class="notif-banner-cta">ENABLE →</div>
    </div>`;
}

async function requestNotifications() {
  if (!('Notification' in window)) { alert('Notifications are not supported in this browser.'); return; }
  const perm = await Notification.requestPermission();
  updateNotifBtn();
  document.getElementById('notif-banner-wrap').innerHTML = '';
  if (perm === 'granted') {
    notifGranted = true;
    scheduleToday();
    new Notification('Prayer Times Active 🕌', {
      body: 'You will be notified at each prayer time. JazakAllah Khair.',
      icon: ''
    });
  }
}

    Math.floor(times[0]/60), times[0]%60, 0, 0).getTime() - 2*60*1000;
  if (sahrMs > nowMs) {
    setTimeout(() => {
      new Notification('⏰ Sahr Reminder', { body: 'Fajr in 2 minutes. End your Sahr now.', icon: '' });
    }, sahrMs - nowMs);
  }

  PNAMES.forEach((name, i) => {
    const pMs = new Date(now.getFullYear(), now.getMonth(), now.getDate(),
      Math.floor(times[i]/60), times[i]%60, 0, 0).getTime();
    if (pMs > nowMs) {
      setTimeout(() => {
        if (i === 1) return; // skip sunrise notification
        new Notification('🕌 ' + name + ' Time', {
          body: fmt(times[i]) + ' — ' + PAR[i],
          icon: ''
        });
      }, pMs - nowMs);
    }
  });
}

// ---- JUMU'AH CARD ----
function renderJumuah(now) {
  const wrap = document.getElementById('jumuah-wrap');
  if (now.getDay() !== 5) { wrap.innerHTML = ''; return; }
  const hadith = FRIDAY_HADITHS[Math.floor(now.getDate() / 7) % FRIDAY_HADITHS.length];
  wrap.innerHTML = `
    <div class="jumuah-card">
      <div class="jumuah-header">
        <div class="jumuah-title">🕌 Jumu'ah — Friday</div>
        <div class="jumuah-time">12:30 PM</div>
      </div>
      <div class="jumuah-hadith">"${hadith.text}"</div>
      <div class="jumuah-source">— ${hadith.source}</div>
    </div>`;
}

// ---- TODAY RENDER ----
let lastSecond = -1;
function renderToday() {
  const now = new Date();
  const mo = now.getMonth()+1, d = now.getDate();
  const nowM = now.getHours()*60 + now.getMinutes();
  const sec = now.getSeconds();
  const times = getTimes(mo, d);

  // Clock — every second
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(sec).padStart(2,'0');

  // Rest — only update when minute changes
  if (sec === lastSecond) return;
  lastSecond = sec;

  const hi = toHijri(now.getFullYear(), mo, d);
  document.getElementById('clock-date').textContent =
    WDAYS[now.getDay()]+', '+d+' '+MFULL[mo-1]+' · '+hi.d+' '+HM[hi.m-1]+' '+hi.y+' AH';

  renderJumuah(now);

  // Next prayer
  let nextIdx = -1;
  if (times) for (let i=0;i<times.length;i++) if(times[i]>nowM){nextIdx=i;break;}

  if (times && nextIdx >= 0) {
    const diff = times[nextIdx] - nowM;
    const hh = Math.floor(diff/60), mm = diff%60;
    document.getElementById('next-name').textContent = PNAMES[nextIdx];
    document.getElementById('next-time').textContent = fmt(times[nextIdx]);
    document.getElementById('next-remaining').innerHTML =
      'in <span>'+(hh>0?hh+'h ':'')+mm+' min'+(mm!==1?'s':'')+'</span>';
  } else {
    document.getElementById('next-name').textContent = 'Fajr';
    document.getElementById('next-time').textContent = 'Tomorrow';
    document.getElementById('next-remaining').textContent = 'All prayers completed for today';
  }

  // Prayer list
  const list = document.getElementById('prayer-list');
  list.innerHTML = '';
  if (!times) {
    list.innerHTML = '<div style="text-align:center;color:var(--text-3);padding:2rem;font-size:13px">No data for today</div>';
    return;
  }
  PNAMES.forEach((name, i) => {
    const isPast = times[i] < nowM, isNext = i===nextIdx;
    const el = document.createElement('div');
    el.className = 'prayer-item'+(isNext?' is-next':'')+(isPast&&!isNext?' is-past':'');
    el.innerHTML = `${isNext?'<div class="active-bar"></div>':''}
      <div class="p-dot" style="background:${PCOL[i]}"></div>
      <div style="flex:1"><span class="p-name">${name}</span><span class="p-arabic">${PAR[i]}</span></div>
      <div class="p-time">${fmt(times[i])}</div>`;
    list.appendChild(el);
  });

  // Schedule notifications once per day
  scheduleToday();
}

// ---- TIMETABLE ----
function renderTimetable() {
  const container = document.getElementById('month-list');
  const today = new Date();
  // Day-of-week for Jan 1 2026 = Thursday (4), so Jan 1 offset
  // We compute weekday for each date directly
  Object.entries(RAW).forEach(([mStr, days]) => {
    const mo = parseInt(mStr);
    const isCurrentMonth = mo === today.getMonth()+1;
    const card = document.createElement('div');
    card.className = 'month-card'+(isCurrentMonth?' open':'');
    const rows = days.map(row => {
      const [d, ...ts] = row;
      const isToday = today.getFullYear()===2026 && today.getMonth()+1===mo && today.getDate()===d;
      const dow = new Date(2026, mo-1, d).getDay(); // 5 = Friday
      const isFriday = dow === 5;
      const tMins = ts.map((t,i)=>toMins(t,i));
      const cls = isToday ? 'today-row' : (isFriday ? 'friday-row' : '');
      const dayLabel = d+' '+MSHORT[mo-1]+(isFriday?' 🕌':'');
      return `<tr class="${cls}">
        <td>${dayLabel}</td>
        <td>${fmt(tMins[0])}</td><td>${fmt(tMins[1])}</td>
        <td>${fmt(tMins[2])}</td><td>${fmt(tMins[3])}</td>
        <td>${fmt(tMins[4])}</td><td>${fmt(tMins[5])}</td>
      </tr>`;
    }).join('');
    card.innerHTML = `
      <div class="month-head" onclick="this.parentElement.classList.toggle('open')">
        <span class="month-head-name">${MFULL[mo-1]} 2026</span>
        <span class="month-head-toggle">▾</span>
      </div>
      <div class="month-body"><table class="mt">
        <thead><tr>
          <th>Date</th>
          <th style="color:#6bb8d4">Fajr</th><th style="color:#e8a87c">Rise</th>
          <th style="color:#f5d56a">Dhuhr</th><th style="color:#d4956a">Asr</th>
          <th style="color:#e07b5a">Maghrib</th><th style="color:#7b9ed9">Isha</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
    container.appendChild(card);
  });
}
